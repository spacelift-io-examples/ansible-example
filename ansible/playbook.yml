- name: Test Windows VM via WinRM
  hosts: all
  gather_facts: true
  ignore_unreachable: true
  vars:
    ansible_user: "{{ lookup('env', 'ANSIBLE_USER') }}"
    ansible_password: "{{ lookup('env', 'ANSIBLE_PASSWORD') }}"
  tasks:
    - name: Create a folder
      win_file:
        path: C:\Temp\TestFolder
        state: directory

    - name: Write a text file
      win_file:
        path: C:\Temp\TestFolder\hello.txt
        state: touch
